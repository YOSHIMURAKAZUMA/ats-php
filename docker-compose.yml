services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ats-php-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy
    mem_limit: 768m

  nginx:
    image: nginx:stable-alpine
    container_name: ats-php-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    mem_limit: 128m

  mysql:
    image: mysql:8.4
    container_name: ats-php-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ats_php}
      MYSQL_USER: ${DB_USERNAME:-ats_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    ports:
      - "3306:3306"
    volumes:
      - ats-php-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 512m

volumes:
  ats-php-mysql-data:
